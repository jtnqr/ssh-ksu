name: Build & Release ssh-ksu

on:
  push:
    tags:
      - 'v*'           # triggers on: git tag v1.2.0 && git push --tags
  workflow_dispatch:   # also allows manual "Run workflow" button in GitHub UI
    inputs:
      version_override:
        description: 'Version override (e.g. v1.2.0-beta). Leave blank to use module.prop.'
        required: false
        default: ''

jobs:
  build:
    name: Cross-compile (arm64-v8a + x86_64)
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install system build deps ─────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make autoconf automake libtool \
            perl curl xz-utils unzip zip patch file binutils ccache

      # ── 3. Run QA test suite (Fail early to save build minutes) ──────────
      - name: Run QA test suite
        run: |
          chmod +x tests/run_tests.sh
          sudo bash tests/run_tests.sh

      # ── 4. Cache musl-cross toolchains (saves ~160MB download per run) ────
      - name: Cache musl-cross toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: build/.build/toolchains
          key: musl-toolchains-${{ hashFiles('build/build.sh') }}

      # ── 5. Cache source tarballs (avoids re-downloading source code) ──────
      - name: Cache source tarballs
        uses: actions/cache@v4
        with:
          path: build/.build/src
          key: sources-${{ hashFiles('build/build.sh') }}

      # ── 6. Cache compiler objects (ccache for lightning fast compiles) ────
      - name: Cache compiler objects (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('build/build.sh') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ hashFiles('build/build.sh') }}-

      # ── 7. Build ─────────────────────────────────────────────────────────
      - name: Build all ABIs
        run: |
          chmod +x build/build.sh
          bash build/build.sh all

      # ── 8. Verify ────────────────────────────────────────────────────────
      - name: Verify binaries
        run: |
          chmod +x build/verify.sh
          bash build/verify.sh all

      # ── 9. Pack module ZIP ───────────────────────────────────────────────
      - name: Pack module ZIP
        run: |
          chmod +x pack.sh
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            bash pack.sh --version "${{ github.event.inputs.version_override }}"
          else
            bash pack.sh
          fi

      # ── 10. Read release metadata ────────────────────────────────────────
      - name: Read release metadata
        id: meta
        run: |
          MOD_VERSION="$(grep '^version=' module.prop | cut -d= -f2)"
          MOD_ID="$(grep '^id=' module.prop | cut -d= -f2)"
          ZIP_NAME="${MOD_ID}-${MOD_VERSION}.zip"
          echo "version=${MOD_VERSION}"       >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}"         >> "$GITHUB_OUTPUT"

      # ── 11. Upload ZIP as workflow artifact (always available) ────────────
      - name: Upload module ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: release/${{ steps.meta.outputs.zip_name }}
          retention-days: 90

      # ── 12. Create GitHub Release (only on version tags) ────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ssh-ksu v${{ steps.meta.outputs.version }}"
          body: |
            ## ssh-ksu v${{ steps.meta.outputs.version }}

            Minimalist OpenSSH + rsync server module for KernelSU/Magisk.
            Runs on Port 22. All configuration lives in `/data/adb/ssh/`.

            ### Usage
            1. Flash via **KernelSU Manager** or **Magisk Manager**
            2. Reboot
            3. Add your public key:
               ```sh
               adb push ~/.ssh/id_ed25519.pub /data/adb/ssh/authorized_keys
               adb shell chmod 600 /data/adb/ssh/authorized_keys
               ```
            4. Connect: `ssh root@<device-ip> -p 22`
          files: release/${{ steps.meta.outputs.zip_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, 'beta') || contains(steps.meta.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
