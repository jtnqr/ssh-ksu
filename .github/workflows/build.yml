name: Build & Release ssh-ksu

on:
  push:
    tags:
      - 'v*'           # triggers on: git tag v1.2.0 && git push --tags
  workflow_dispatch:   # also allows manual "Run workflow" button in GitHub UI
    inputs:
      version_override:
        description: 'Version override (e.g. v1.2.0-beta). Leave blank to use module.prop.'
        required: false
        default: ''

jobs:
  build:
    name: Cross-compile (arm64-v8a + x86_64)
    runs-on: ubuntu-24.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install system build deps ─────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make autoconf automake libtool \
            perl curl xz-utils unzip zip patch file binutils

      # ── 3. Cache NDK download (saves ~700MB bandwidth on repeat runs) ────
      - name: Cache Android NDK r27d
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /opt/android-ndk
          key: android-ndk-r27d-linux

      - name: Install Android NDK r27d
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/android-ndk
          curl -fsSL \
            "https://dl.google.com/android/repository/android-ndk-r27d-linux.zip" \
            -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt/android-ndk
          rm /tmp/ndk.zip

      # ── 4. Cache source tarballs (avoids re-downloading on each run) ─────
      - name: Cache source tarballs
        uses: actions/cache@v4
        with:
          path: build/.build/src
          key: sources-${{ hashFiles('build/build.sh') }}
          # Key tied to build.sh hash — invalidates when version pins change

      # ── 5. Build ─────────────────────────────────────────────────────────
      - name: Build all ABIs
        env:
          ANDROID_NDK_HOME: /opt/android-ndk/android-ndk-r27d
        run: |
          chmod +x build/build.sh
          bash build/build.sh all

      # ── 6. Verify ────────────────────────────────────────────────────────
      - name: Verify binaries
        run: |
          chmod +x build/verify.sh
          bash build/verify.sh all

      # ── 7. Pack module ZIP ───────────────────────────────────────────────
      - name: Pack module ZIP
        run: |
          chmod +x pack.sh
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            bash pack.sh --version "${{ github.event.inputs.version_override }}"
          else
            bash pack.sh
          fi

      # ── 8. Read release metadata ─────────────────────────────────────────
      - name: Read release metadata
        id: meta
        run: |
          MOD_VERSION="$(grep '^version=' module.prop | cut -d= -f2)"
          MOD_ID="$(grep '^id=' module.prop | cut -d= -f2)"
          ZIP_NAME="${MOD_ID}-${MOD_VERSION}.zip"
          CHECKSUM="$(cat release/${ZIP_NAME}.sha256 2>/dev/null || echo 'N/A')"
          echo "version=${MOD_VERSION}"       >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}"         >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}"         >> "$GITHUB_OUTPUT"

      # ── 9. Upload ZIP as workflow artifact (always available) ─────────────
      - name: Upload module ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: |
            release/${{ steps.meta.outputs.zip_name }}
            release/${{ steps.meta.outputs.zip_name }}.sha256
          retention-days: 90

      # ── 10. Upload x86_64 binaries separately (for testing/embedding) ────
      - name: Upload x86_64 binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64
          path: build/out/x86_64/
          retention-days: 30

      # ── 11. Create GitHub Release (only on version tags) ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ssh-ksu ${{ steps.meta.outputs.version }}"
          body: |
            ## ssh-ksu ${{ steps.meta.outputs.version }}

            Minimalist OpenSSH + rsync server module for KernelSU/Magisk.
            Runs on Port 22. All configuration lives in `/data/adb/ssh/`.

            ### Binaries (statically compiled from source)
            | Tool | Version |
            |------|---------|
            | OpenSSH | See `build/build.sh` version pin |
            | OpenSSL | See `build/build.sh` version pin |
            | rsync   | See `build/build.sh` version pin |

            ### Verification
            ```
            SHA-256: ${{ steps.meta.outputs.checksum }}
            ```

            ### Usage
            1. Flash via **KernelSU Manager** or **Magisk Manager**
            2. Reboot
            3. Add your public key:
               ```sh
               adb push ~/.ssh/id_ed25519.pub /data/adb/ssh/authorized_keys
               adb shell chmod 600 /data/adb/ssh/authorized_keys
               ```
            4. Connect: `ssh root@<device-ip> -p 22`
          files: |
            release/${{ steps.meta.outputs.zip_name }}
            release/${{ steps.meta.outputs.zip_name }}.sha256
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, 'beta') || contains(steps.meta.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
